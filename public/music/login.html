<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LX Music Web</title>
    <script src="/js/config.js"></script>
    <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <script src="assets/tailwindcss.js"></script>
    <script src="js/tailwind_setup.js"></script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981, #14b8a6, #3b82f6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .theme-gradient-bg {
            background: linear-gradient(135deg, #10b981, #0d9488) !important;
        }

        .theme-gradient-btn {
            background: linear-gradient(to right, #10b981, #0d9488) !important;
            border: none !important;
        }

        .theme-gradient-btn:hover {
            background: linear-gradient(to right, #059669, #0f766e) !important;
        }
    </style>
</head>

<body>

    <!-- Background Animation -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute w-96 h-96 t-bg-panel/10 rounded-full blur-3xl -top-48 -left-48 animate-pulse"></div>
        <div class="absolute w-96 h-96 t-bg-panel/10 rounded-full blur-3xl -bottom-48 -right-48 animate-pulse"
            style="animation-delay: 1s;"></div>
    </div>

    <!-- Auth Card -->
    <div class="relative z-10 t-bg-panel/95 backdrop-blur-xl rounded-3xl shadow-2xl p-10 w-full max-w-md mx-4 transform transition-all duration-500"
        id="auth-card">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div
                class="w-20 h-20 theme-gradient-bg rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg transform hover:scale-105 transition-transform">
                <i class="fas fa-music text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black t-text-main mb-2">LX Music Web</h1>
            <p class="text-gray-500 text-sm">输入密码以访问播放器</p>
        </div>

        <!-- Password Input -->
        <form onsubmit="handleLogin(event)" class="space-y-6">
            <div class="relative">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 t-text-muted">
                    <i class="fas fa-lock"></i>
                </div>
                <input type="password" id="auth-password-input" placeholder="请输入访问密码"
                    class="w-full pl-12 pr-4 py-4 t-bg-main border-2 t-border-main rounded-xl focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 transition-all t-text-main placeholder-gray-400"
                    autocomplete="current-password">
            </div>

            <!-- Error Message -->
            <div id="auth-error" class="hidden text-red-500 text-sm text-center bg-red-50 py-2 px-4 rounded-lg">
                <i class="fas fa-exclamation-circle mr-1"></i>
                <span>密码错误，请重试</span>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submit-btn"
                class="w-full py-4 theme-gradient-btn text-white font-bold rounded-xl shadow-lg shadow-emerald-200 hover:shadow-xl hover:shadow-emerald-300 transform hover:scale-[1.02] active:scale-[0.98] transition-all">
                <i class="fas fa-sign-in-alt mr-2"></i>
                进入播放器
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs t-text-muted">
            <p>请联系管理员获取访问密码</p>
        </div>
    </div>

    <script>
        // 如果未开启认证或已有有效 Session，直接跳转到播放器
        (async () => {
            try {
                const res = await fetch('/api/music/config')
                const cfg = await res.json()
                if (!cfg['player.enableAuth']) {
                    window.location.replace('./')
                    return
                }
                const verifyRes = await fetch('/api/music/auth/verify')
                const verifyData = await verifyRes.json()
                if (verifyData.valid) {
                    window.location.replace('./')
                }
            } catch (e) {
                console.error('[Login] 初始化检查失败:', e)
            }
        })()

        async function handleLogin(event) {
            event.preventDefault()
            const password = document.getElementById('auth-password-input').value
            const errorDiv = document.getElementById('auth-error')
            const submitBtn = document.getElementById('submit-btn')
            const card = document.getElementById('auth-card')

            if (!password) return

            submitBtn.disabled = true
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>验证中...'
            errorDiv.classList.add('hidden')

            try {
                const res = await fetch('/api/music/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                })
                const data = await res.json()

                if (data.success) {
                    submitBtn.innerHTML = '<i class="fas fa-check mr-2"></i>验证成功，跳转中...'
                    setTimeout(() => window.location.replace('./'), 300)
                } else {
                    errorDiv.classList.remove('hidden')
                    // 抖动效果
                    card.style.transform = 'translateX(-8px)'
                    setTimeout(() => card.style.transform = 'translateX(8px)', 80)
                    setTimeout(() => card.style.transform = 'translateX(-5px)', 160)
                    setTimeout(() => card.style.transform = 'translateX(0)', 240)

                    const input = document.getElementById('auth-password-input')
                    input.value = ''
                    input.classList.add('border-red-500')
                    setTimeout(() => input.classList.remove('border-red-500'), 500)
                    input.focus()

                    submitBtn.disabled = false
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>进入播放器'
                }
            } catch (e) {
                console.error('[Login] 请求失败:', e)
                errorDiv.querySelector('span').textContent = '网络错误，请稍后重试'
                errorDiv.classList.remove('hidden')
                submitBtn.disabled = false
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>进入播放器'
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('auth-password-input').focus()
        })
    </script>
</body>

</html>
